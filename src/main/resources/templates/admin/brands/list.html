<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/main}">
<head>
    <title layout:fragment="title">Quản lý Hãng điện thoại</title>
</head>
<body>
<section layout:fragment="content">
    <div class="mb-3">
        <h3 class="font-weight-bold mb-1">Quản lý Hãng điện thoại</h3>
        <p class="text-muted mb-0">Quản lý các thương hiệu điện thoại trong hệ thống</p>
    </div>

    <div th:if="${successMessage != null}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage != null}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="d-flex flex-wrap align-items-center mb-2">
        <form class="form-inline mb-3 mb-md-0 flex-grow-1" method="get" th:action="@{/admin/brands}">
            <input type="text"
                   class="form-control mr-2 mb-2 mb-md-0"
                   name="q"
                   placeholder="Tìm tên hãng..."
                   style="min-width:280px;"
                   th:value="${query != null ? query : ''}">
            <input type="hidden" name="size" th:value="${pageSize != null ? pageSize : 10}">
            <button class="btn btn-primary mr-2" type="submit">Tìm kiếm</button>
            <a th:if="${query != null}"
               th:href="@{/admin/brands}"
               class="btn btn-light">Xóa lọc</a>
        </form>
        <a th:href="@{/admin/brands/new}" class="btn btn-success ml-auto">
            <i class="ti-plus mr-2"></i>Thêm hãng
        </a>
    </div>
    <p class="text-muted mb-4">
        <small>
            Tổng: <span th:text="${totalBrands}">0</span> hãng điện thoại
        </small>
    </p>
    
    <div class="card mb-4">
        <div class="card-body">
            <p class="card-title">
                Danh sách hãng điện thoại
                <small class="text-muted">
                    (<span th:text="${totalItems}">0</span> kết quả
                    <th:block th:if="${query != null and !#strings.isEmpty(query)}">
                        cho "<b th:text="${query}"></b>"
                    </th:block>)
                </small>
            </p>
            <div class="table-responsive">
                <table class="table table-striped mb-0">
                    <thead>
                    <tr>
                        <th>STT</th>
                        <th>Tên hãng</th>
                        <th>Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(brands)}">
                        <td colspan="3" class="text-center text-muted py-4">
                            Không có hãng điện thoại nào
                        </td>
                    </tr>
                    <tr th:each="brand, iter : ${brands}">
                        <td th:text="${(currentPage - 1) * pageSize + iter.index + 1}">1</td>
                        <td>
                            <span class="font-weight-semibold" th:text="${brand.name}">Tên hãng</span>
                        </td>
                        <td>
                            <div class="btn-group" role="group">
                                <button class="btn btn-sm btn-outline-primary" type="button" disabled>
                                    Sửa
                                </button>
                                <button class="btn btn-sm btn-outline-danger" type="button" disabled>
                                    Xóa
                                </button>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
            
            <nav th:if="${totalPages > 1}" aria-label="Phân trang hãng">
                <ul class="pagination justify-content-center mt-3">
                    <li class="page-item" th:classappend="${currentPage == 1} ? ' disabled'">
                        <a class="page-link" th:href="@{/admin/brands(page=1, size=${pageSize}, q=${query})}">Đầu</a>
                    </li>
                    <li class="page-item"
                        th:each="pageNum : ${#numbers.sequence(startPage, endPage)}"
                        th:classappend="${pageNum == currentPage} ? ' active'">
                        <a class="page-link"
                           th:href="@{/admin/brands(page=${pageNum}, size=${pageSize}, q=${query})}"
                           th:text="${pageNum}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage == totalPages} ? ' disabled'">
                        <a class="page-link" th:href="@{/admin/brands(page=${totalPages}, size=${pageSize}, q=${query})}">Cuối</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

</section>
</body>
</html>
