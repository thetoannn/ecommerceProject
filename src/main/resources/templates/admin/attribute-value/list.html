<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/main}">
<head>
    <title layout:fragment="title">Chi tiết thông số</title>
</head>
<body>
<section layout:fragment="content">
    <div class="mb-3">
        <h3 class="font-weight-bold mb-1">Chi tiết thông số</h3>
        <p class="text-muted mb-0">
            <span th:if="${selectedAttributeName != null}">
                Thông số: <strong th:text="${selectedAttributeName}"></strong>
            </span>
            <span th:unless="${selectedAttributeName != null}">
                Quản lý giá trị của các thông số
            </span>
        </p>
    </div>

    <div th:if="${success != null}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="close" data-dismiss="alert">&times;</button>
    </div>
    <div th:if="${error != null}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="close" data-dismiss="alert">&times;</button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="d-flex align-items-center">
            <a th:href="@{/admin/attributes}" class="btn btn-light mr-3">
                <i class="ti-arrow-left mr-2"></i> Quay lại
            </a>
            
            <form class="form-inline" method="get" th:action="@{/admin/attribute-values}">
                <label class="mr-2 mb-0">Chọn thuộc tính:</label>
                <select class="form-control mr-2" name="attributeId" onchange="this.form.submit()">
                    <option th:each="attr : ${attributes}"
                            th:value="${attr.id}"
                            th:selected="${selectedAttributeId != null && selectedAttributeId == attr.id}"
                            th:text="${attr.name}">
                    </option>
                </select>
            </form>
        </div>
        
        <a th:href="@{/admin/attribute-values/new(attributeId=${selectedAttributeId})}" 
           class="btn btn-success"
           th:if="${selectedAttributeId != null}">
            <i class="ti-plus mr-2"></i> Thêm giá trị
        </a>
    </div>
    
    <div class="card">
        <div class="card-body">
            <p class="card-title mb-3" th:if="${selectedAttributeId != null}">
                Danh sách giá trị
                <small class="text-muted">(<span th:text="${#lists.size(attributeValues)}">0</span> giá trị)</small>
            </p>

            <div class="table-responsive" th:if="${selectedAttributeId != null}">
                <table class="table table-striped">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Giá trị</th>
                        <th>Thuộc tính</th>
                        <th>Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(attributeValues)}">
                        <td colspan="4" class="text-center text-muted py-4">
                            Chưa có giá trị nào
                        </td>
                    </tr>
                    <tr th:each="val : ${attributeValues}">
                        <td th:text="${val.id}">1</td>
                        <td>
                            <strong th:text="${val.value}">Blue</strong>
                        </td>
                        <td th:text="${val.attribute != null ? val.attribute.name : '—'}">Color</td>
                        <td class="text-nowrap">
                            <a th:href="@{/admin/attribute-values/{id}/edit(id=${val.id})}" 
                               class="btn btn-sm btn-outline-primary mr-2">
                                <i class="ti-pencil"></i> Sửa
                            </a>
                            <form th:action="@{/admin/attribute-values/{id}/delete(id=${val.id})}" 
                                  method="post" 
                                  style="display: inline;"
                                  onsubmit="return confirm('Xóa giá trị này sẽ xóa tất cả liên kết với sản phẩm. Bạn có chắc chắn?');">
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="ti-trash"></i> Xóa
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
            
            <div th:unless="${selectedAttributeId != null}" class="text-center text-muted py-5">
                <i class="ti-info-alt" style="font-size: 48px;"></i>
                <p class="mt-3">Vui lòng chọn một thuộc tính để xem và quản lý giá trị</p>
            </div>
        </div>
    </div>
</section>
</body>
</html>
