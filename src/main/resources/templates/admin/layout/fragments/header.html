<div th:fragment="navbar">
    <nav class="navbar col-lg-12 col-12 p-0 fixed-top d-flex flex-row">
        <div class="text-center navbar-brand-wrapper d-flex align-items-center justify-content-center">
            <a class="navbar-brand brand-logo mr-5" th:href="@{/admin/dashboard}">
                <img th:src="@{/admin/images/logo.svg}" class="mr-2" alt="logo">
            </a>
            <a class="navbar-brand brand-logo-mini" th:href="@{/admin/dashboard}">
                <img th:src="@{/admin/images/logo-mini.svg}" alt="logo">
            </a>
        </div>
        <div class="navbar-menu-wrapper d-flex align-items-center justify-content-end">
            <button class="navbar-toggler navbar-toggler align-self-center" type="button" data-toggle="minimize">
                <span class="icon-menu"></span>
            </button>
            <ul class="navbar-nav mr-lg-2">
                <li class="nav-item nav-search d-none d-lg-block">
                    <div class="input-group">
                        <div class="input-group-prepend hover-cursor" id="navbar-search-icon">
                            <span class="input-group-text" id="search">
                                <i class="icon-search"></i>
                            </span>
                        </div>
                        <input type="text" class="form-control" id="navbar-search-input" placeholder="Search now"
                            aria-label="search" aria-describedby="search">
                    </div>
                </li>
            </ul>
            <ul class="navbar-nav navbar-nav-right">
                <li class="nav-item dropdown">
                    <a class="nav-link count-indicator dropdown-toggle" id="notificationDropdown" href="#"
                        data-toggle="dropdown">
                        <i class="icon-bell mx-0"></i>
                        <span class="count" th:text="${notificationCount > 0} ? ${notificationCount} : ''"
                            th:if="${notificationCount > 0}">0</span>
                    </a>
                    <div class="dropdown-menu dropdown-menu-right navbar-dropdown preview-list"
                        aria-labelledby="notificationDropdown"
                        style="width: 350px; max-height: 400px; overflow-y: auto;">
                        <div class="d-flex justify-content-between align-items-center px-3 py-2 border-bottom">
                            <p class="mb-0 font-weight-normal dropdown-header">Thông báo</p>
                            <a th:href="@{/notifications}" class="text-primary small">Xem tất cả</a>
                        </div>
                        <div id="adminNotificationsList">
                            <div class="text-center py-3">
                                <div class="spinner-border spinner-border-sm text-primary" role="status">
                                    <span class="sr-only">Loading...</span>
                                </div>
                            </div>
                        </div>
                        <div class="text-center py-2 border-top" th:if="${notificationCount > 0}">
                            <form th:action="@{/notifications/api/mark-all-read}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-link text-primary p-0">Đánh dấu tất cả đã
                                    đọc</button>
                            </form>
                        </div>
                    </div>
                </li>
                <li class="nav-item nav-profile dropdown">
                    <a class="nav-link dropdown-toggle" href="#" data-toggle="dropdown" id="profileDropdown">
                        <img th:src="@{/admin/images/faces/face28.jpg}" alt="profile">
                        <span class="ml-2 d-none d-lg-inline" sec:authentication="name">Admin</span>
                    </a>
                    <div class="dropdown-menu dropdown-menu-right navbar-dropdown" aria-labelledby="profileDropdown">
                        <a class="dropdown-item" th:href="@{/profile}">
                            <i class="ti-user text-primary"></i>
                            Hồ sơ
                        </a>
                        <a class="dropdown-item" th:href="@{/notifications}">
                            <i class="ti-bell text-primary"></i>
                            Thông báo
                            <span class="badge badge-danger ml-2" th:text="${notificationCount}"
                                th:if="${notificationCount > 0}">0</span>
                        </a>
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="dropdown-item"
                                style="border: none; background: transparent; cursor: pointer;">
                                <i class="ti-power-off text-primary"></i>
                                Đăng xuất
                            </button>
                        </form>
                    </div>
                </li>
                <li class="nav-item nav-settings d-none d-lg-flex">
                    <a class="nav-link" href="#">
                        <i class="icon-ellipsis"></i>
                    </a>
                </li>
            </ul>
            <button class="navbar-toggler navbar-toggler-right d-lg-none align-self-center" type="button"
                data-toggle="offcanvas">
                <span class="icon-menu"></span>
            </button>
        </div>
    </nav>
</div>
