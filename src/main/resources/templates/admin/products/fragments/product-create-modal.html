<th:block th:fragment="productCreateModal" xmlns:th="http://www.thymeleaf.org">
    <div class="modal fade modal-product" id="productCreateModal" tabindex="-1" role="dialog"
         aria-labelledby="productCreateModalLabel" aria-hidden="true"
         th:data-initial-mode="${productFormMode != null ? productFormMode : 'create'}"
         th:data-initial-open="${productModalActive != null ? productModalActive : false}">
        <div class="modal-dialog modal-lg" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="productCreateModalLabel">Thêm sản phẩm</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <form id="productCreateForm" th:object="${productForm}" method="post" th:action="@{/admin/products}" enctype="multipart/form-data">
                    <div class="modal-body">
                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label for="createProductName">Tên sản phẩm</label>
                                <input id="createProductName" type="text" class="form-control"
                                       th:field="*{name}" placeholder="Nhập tên sản phẩm">
                                <div class="text-danger small" th:if="${#fields != null and #fields.hasErrors('name')}" th:errors="*{name}"></div>
                            </div>
                            <div class="form-group col-md-6">
                                <label for="createProductPrice">Giá bán (₫)</label>
                                <input id="createProductPrice" type="number" step="1000" min="0" class="form-control"
                                       th:field="*{price}" placeholder="Nhập giá bán">
                                <div class="text-danger small" th:if="${#fields != null and #fields.hasErrors('price')}" th:errors="*{price}"></div>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label for="createProductStock">Tồn kho</label>
                                <input id="createProductStock" type="number" min="0" class="form-control"
                                       th:field="*{stock}" placeholder="Số lượng hiện có">
                                <div class="text-danger small" th:if="${#fields != null and #fields.hasErrors('stock')}" th:errors="*{stock}"></div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="createProductImages">Hình ảnh sản phẩm <span class="text-danger">*</span></label>
                            <input id="createProductImages" type="file" name="images" class="form-control-file" multiple accept="image/*">
                            <small class="form-text text-muted">
                                Chọn từ 1 đến 6 ảnh, ảnh đầu tiên sẽ là ảnh chính.
                            </small>
                            <div id="createImageError" class="text-danger small mt-1" style="display: none;"></div>
                            <div id="createImagePreviewContainer" class="mt-3" style="display: none;">
                                <label class="mb-2">Preview ảnh đã chọn (<span id="createImageCount">0</span>/6):</label>
                                <div id="createImagePreviewList" class="d-flex flex-wrap gap-2"></div>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label for="createProductBrand">Hãng sản xuất</label>
                                <div class="combobox-wrapper">
                                    <input type="text"
                                           id="createProductBrandInput"
                                           class="form-control combobox-input"
                                           placeholder="Chọn hãng"
                                           autocomplete="off">
                                    <input type="hidden" id="createProductBrand" name="brandId" th:field="*{brandId}">
                                    <ul id="createProductBrandDropdown" class="combobox-dropdown"></ul>
                                </div>
                                <div class="text-danger small" th:if="${#fields != null and #fields.hasErrors('brandId')}" th:errors="*{brandId}"></div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="createProductDescription">Mô tả</label>
                            <textarea id="createProductDescription" class="form-control" rows="4"
                                      th:field="*{description}" placeholder="Thông tin sản phẩm"></textarea>
                            <div class="text-danger small" th:if="${#fields != null and #fields.hasErrors('description')}" th:errors="*{description}"></div>
                        </div>

                        <div class="form-group">
                            <label>Thông số kĩ thuật sản phẩm</label>
                            <div id="createProductAttributesContainer" class="border rounded p-3">
                                <!-- Dynamic attribute selection will be rendered here -->
                            </div>
                            <small class="form-text text-muted">
                                Chọn các thông số kĩ thuật như Color, Storage, RAM cho sản phẩm
                            </small>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-light" data-dismiss="modal">Đóng</button>
                        <button type="submit" class="btn btn-gradient-primary" id="productCreateFormSubmit">
                            Lưu sản phẩm
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</th:block>
