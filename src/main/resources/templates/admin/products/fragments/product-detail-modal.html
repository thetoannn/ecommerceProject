<th:block th:fragment="productDetailModal" xmlns:th="http://www.thymeleaf.org">
    <div class="modal fade modal-product" id="productDetailModal" tabindex="-1" role="dialog"
         aria-labelledby="productDetailModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="productDetailModalLabel">Thông tin sản phẩm</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="d-flex align-items-center mb-3">
                        <div class="rounded mr-3 bg-light" style="width:80px;height:80px;overflow:hidden;">
                            <img id="detailProductImage" src="" alt="Product image"
                                 style="width:100%;height:100%;object-fit:cover;">
                        </div>
                        <div>
                            <h4 class="mb-1" id="detailProductName">Tên sản phẩm</h4>
                            <p class="text-muted mb-0">#<span id="detailProductId">0</span></p>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4">
                            <p class="text-muted mb-1">Giá bán</p>
                            <h5 id="detailProductPrice">0 ₫</h5>
                        </div>
                        <div class="col-md-4">
                            <p class="text-muted mb-1">Tồn kho</p>
                            <h5 id="detailProductStock">0</h5>
                        </div>
                    </div>
                    <div class="row mt-3">
                        <div class="col-md-6">
                            <p class="text-muted mb-1">Hãng</p>
                            <h6 id="detailProductBrand">—</h6>
                        </div>
                    </div>
                    <div class="mt-3">
                        <p class="text-muted mb-1">Mô tả</p>
                        <p id="detailProductDescription" class="mb-0">—</p>
                    </div>
                    <div class="mt-3" id="detailProductAttributesContainer">
                        <p class="text-muted mb-2">Thông số kĩ thuật sản phẩm</p>
                        <div id="detailProductAttributesList" class="d-flex flex-wrap gap-2">
                            <span class="text-muted small">—</span>
                        </div>
                    </div>
                    <div class="mt-3" id="detailProductImagesContainer" style="display: none;">
                        <p class="text-muted mb-2">Hình ảnh sản phẩm</p>
                        <div id="detailProductImagesList" class="d-flex flex-wrap gap-2"></div>
                    </div>
                    <div class="mt-3 text-muted small">
                        <div>Cập nhật: <span id="detailProductUpdated">—</span></div>
                        <div>Tạo lúc: <span id="detailProductCreated">—</span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</th:block>
