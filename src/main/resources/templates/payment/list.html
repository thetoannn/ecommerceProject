<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/main}">

<head>
    <title layout:fragment="title">Phương thức thanh toán - Hồ sơ của tôi</title>
</head>

<body>
    <section layout:fragment="content">
        <section class="py-5">
            <div class="container">
                <div class="d-flex justify-content-between align-items-center">
                    <h1 class="page-title pb-2">Phương thức thanh toán</h1>
                    <nav class="breadcrumb fs-6">
                        <a class="breadcrumb-item nav-link" th:href="@{/}">Home</a>
                        <a class="breadcrumb-item nav-link" th:href="@{/profile}">Hồ sơ</a>
                        <span class="breadcrumb-item active" aria-current="page">Thanh toán</span>
                    </nav>
                </div>
            </div>
        </section>

        <section class="pb-5">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-10">
                        <div th:if="${successMessage}" class="alert alert-success py-2 px-3 small mb-4" role="alert"
                            th:text="${successMessage}"></div>
                        <div th:if="${errorMessage}" class="alert alert-danger py-2 px-3 small mb-4" role="alert"
                            th:text="${errorMessage}"></div>

                        <div class="d-flex justify-content-end mb-4">
                            <a th:href="@{/payment/create}" class="btn btn-dark d-flex align-items-center gap-2">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <line x1="12" y1="5" x2="12" y2="19"></line>
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                </svg>
                                <span>Thêm phương thức mới</span>
                            </a>
                        </div>

                        <div class="row">
                            <div th:if="${#lists.isEmpty(payments)}" class="col-12 text-center py-5">
                                <div class="mb-3 text-muted">
                                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="1" class="mb-3">
                                        <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
                                        <line x1="1" y1="10" x2="23" y2="10"></line>
                                    </svg>
                                    <p>Bạn chưa có phương thức thanh toán nào.</p>
                                </div>
                                <a th:href="@{/payment/create}" class="btn btn-outline-dark">Thêm ngay</a>
                            </div>

                            <div th:each="payment : ${payments}" class="col-md-6 mb-4">
                                <div class="card border-0 shadow-sm h-100">
                                    <div class="card-body p-4">
                                        <div class="d-flex justify-content-between align-items-start mb-3">
                                            <div class="d-flex align-items-center gap-2">
                                                <svg th:if="${payment.method.name() == 'COD'}" width="24" height="24"
                                                    viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                                    stroke-width="2">
                                                    <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                                                    <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
                                                </svg>
                                                <svg th:if="${payment.method.name() == 'BANK_TRANSFER'}" width="24"
                                                    height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                                    stroke-width="2">
                                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                                                </svg>
                                                <svg th:if="${payment.method.name() == 'CREDIT_CARD'}" width="24"
                                                    height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                                    stroke-width="2">
                                                    <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
                                                    <line x1="1" y1="10" x2="23" y2="10"></line>
                                                </svg>
                                                <svg th:if="${payment.method.name() == 'MOMO'}" width="24" height="24"
                                                    viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                                    stroke-width="2">
                                                    <path d="M21 12V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h7">
                                                    </path>
                                                    <path d="M16 19h6"></path>
                                                    <path d="M19 16v6"></path>
                                                </svg>
                                                <h5 class="card-title mb-0 fw-bold"
                                                    th:text="${payment.method.displayName}">Phương thức</h5>
                                            </div>
                                            <span th:if="${payment.isDefault}" class="badge bg-dark">Mặc định</span>
                                        </div>
                                        <div class="card-text small text-muted mb-4">
                                            <div class="mb-2" th:if="${payment.method.name() != 'COD'}">
                                                <span class="text-uppercase x-small">Số tài khoản / thẻ:</span>
                                                <p class="mb-0 fw-semibold text-dark"
                                                    th:text="${payment.accountNumber}">**** **** **** 1234</p>
                                            </div>
                                            <p class="mb-0 italic" th:text="${payment.method.description}"></p>
                                        </div>
                                        <div class="d-flex justify-content-between align-items-center mt-auto">
                                            <div class="d-flex gap-2">
                                                <a th:href="@{/payment/edit/{id}(id=${payment.id})}"
                                                    class="btn btn-sm btn-outline-dark px-3">Sửa</a>
                                                <form th:action="@{/payment/delete/{id}(id=${payment.id})}"
                                                    method="post"
                                                    onsubmit="return confirm('Bạn có chắc chắn muốn xóa phương thức này?')">
                                                    <button type="submit"
                                                        class="btn btn-sm btn-outline-danger px-3">Xóa</button>
                                                </form>
                                            </div>
                                            <form th:if="${!payment.isDefault}"
                                                th:action="@{/payment/set-default/{id}(id=${payment.id})}"
                                                method="post">
                                                <button type="submit"
                                                    class="btn btn-sm btn-link text-dark p-0 text-decoration-none small">Đặt
                                                    làm mặc định</button>
                                            </form>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </section>
</body>

</html>
