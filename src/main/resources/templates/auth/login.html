<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title layout:fragment="title">Login</title>
</head>
<body>
<section layout:fragment="content">
    <section id="login-form" class="py-5 my-5">
        <div class="container-sm">
            <div class="row justify-content-center">
                <div class="col-md-4">
                    <div class="breadcrumbs pt-3 my-4">
                        <span class="item"><a th:href="@{/}">Home /</a></span>
                        <span class="item">My Account</span>
                    </div>
                    <h2 class="section-title text-uppercase">Login</h2>
                    <form id="form" method="post" th:action="@{/login}" class="form-group flex-wrap">
                        <div class="col-12 pb-3">
                            <label>Username *</label>
                            <input type="text" name="username" placeholder="Write your username here" class="form-control" required>
                        </div>
                        <div class="col-12 pb-3">
                            <label>Password *</label>
                            <input type="password" name="password" placeholder="Enter your password" class="form-control" required>
                        </div>
                        <div class="col-12 pb-3">
                            <label>
                                <input type="checkbox" name="remember-me">
                                <span class="label-body">Remember me</span>
                            </label>
                        </div>
                        <div class="col-12">
                            <button type="submit" name="submit" class="btn btn-dark text-uppercase w-100">Log in</button>
                            <div class="mt-3 d-flex justify-content-between align-items-center">
                                <small>Don't have an account? <a th:href="@{/register}" class="text-muted">Register</a></small>
                                <small><a href="#" class="text-muted">Forgot password</a></small>
                            </div>
                        </div>
                        <div class="col-12 mt-3">
                            <div class="text-danger" th:if="${param.error}">Invalid credentials. Please try again.</div>
                            <div class="text-success" th:if="${param.logout}">You have been logged out.</div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>
</section>
</body>
</html>
